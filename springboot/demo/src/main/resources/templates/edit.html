<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#f4f6f9;
    }

    .card{
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2{
        font-weight:bold;
    }

    .table th{
        background:#0d6efd;
        color:white;
    }
</style>

<h2 class="text-center mb-4">Edit Student</h2>

<div class="row justify-content-center">

    <div class="col-md-6">

        <!-- UPDATE STUDENT -->
        <div class="card p-4 mb-4">

            <h4 class="text-center mb-3">Update Student</h4>

            <form th:action="@{/students/update}" method="post" th:object="${student}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" th:field="*{age}" required>
                </div>

                <button class="btn btn-success w-100">Update Student</button>

                <a th:href="@{/students}" class="btn btn-secondary w-100 mt-2">
                    Back
                </a>

            </form>

        </div>


        <!-- ENROLL SUBJECT -->
        <div class="card p-4">

            <h4 class="mb-3">Add Subject</h4>

            <form th:action="@{/students/enroll}" method="post">

                <input type="hidden" name="studentId" th:value="${student.id}">

                <div class="input-group mb-3">

                    <select name="subjectId" class="form-control">

                        <option th:each="s : ${subjects}"
                                th:value="${s.id}"
                                th:text="${s.name}">
                        </option>

                    </select>

                    <button class="btn btn-primary">
                        Add
                    </button>

                </div>

            </form>


            <h5 class="mt-3">Registered Subjects</h5>

            <table class="table table-bordered table-hover">

                <thead>
                <tr>
                    <th>Subject</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="sub : ${student.subjects}">

                    <td th:text="${sub.name}"></td>

                    <td>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/students/remove-subject(studentId=${student.id},subjectId=${sub.id})}">
                            Remove
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
