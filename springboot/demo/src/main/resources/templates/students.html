<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#f4f6f9;
    }

    .card{
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .table th{
        background:#0d6efd;
        color:white;
    }

    h2{
        font-weight:bold;
    }
</style>
<h2 class="text-center mb-4">Student Management</h2>
<form th:action="@{/students/search}" method="get" class="mb-3">

    <div class="input-group">

        <input type="text" name="keyword"
               class="form-control"
               placeholder="Search by name...">

        <button class="btn btn-primary">
            Search
        </button>

    </div>

</form>
<div class="row">

    <!-- FORM ADD STUDENT -->
    <div class="col-md-4">

        <div class="card p-4">

            <h4 class="text-center mb-3">Add Student</h4>

            <form th:action="@{/students/save}" method="post">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <button class="btn btn-primary w-100">Add Student</button>

            </form>

        </div>

    </div>

    <!-- TABLE STUDENT LIST -->
    <div class="col-md-8">

        <div class="card p-4">

            <h4 class="mb-3">Student List</h4>

            <table class="table table-hover">

                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${students}">
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.age}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{/students/edit/{id}(id=${s.id})}">
                            Edit
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/students/delete/{id}(id=${s.id})}">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
